<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Todo App-kayga</title>
    <style>
        /* CSS: Qurxinta */
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 70%; padding: 5px; }
        button { padding: 5px 10px; cursor: pointer; background: #28a745; color: white; border: none; }
        ul { list-style: none; padding: 0; }
        li { background: #eee; margin: 5px 0; padding: 8px; display: flex; justify-content: space-between; border-radius: 5px; }
        .delete { color: red; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Shaqadayda Maanta</h2>
    <input type="text" id="taskInput" placeholder="Ku qor shaqo...">
    <button onclick="addTask()">Ku dar</button>
    <ul id="taskList"></ul>
</div>

<script>
    // JavaScript: Habka
    function addTask() {
        let input = document.getElementById("taskInput");
        let task = input.value;
        if (task === "") return;

        let li = document.createElement("li");
        li.innerHTML = task + ' <span class="delete" onclick="this.parentElement.remove()">X</span>';
        document.getElementById("taskList").appendChild(li);
        input.value = "";
    }
</script>

</body>
</html>
